<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Simple & Fast</title>
    <meta name="description" content="A simple, fast, and mobile-friendly expense tracker for daily household use.">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <section id="auth-view" class="view hidden">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <p>Track your daily expenses effortlessly.</p>
                <button id="login-btn" class="btn btn-primary btn-lg">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Sign in with Google
                </button>
            </div>
        </section>

        <!-- Main View -->
        <section id="main-view" class="view hidden">
            <header class="app-header">
                <div class="header-content">
                    <div class="user-info">
                        <span id="user-name">Welcome, User</span>
                    </div>
                    <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
                </div>
            </header>

            <main class="container">
                <!-- Dashboard Summary -->
                <section class="dashboard-summary">
                    <div class="summary-card">
                        <h3>This Month</h3>
                        <p id="total-month">₹0.00</p>
                    </div>
                    <div class="summary-card">
                        <h3>Today</h3>
                        <p id="total-today">₹0.00</p>
                    </div>
                </section>

                <div class="action-bar">
                    <button id="add-expense-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Expense
                    </button>
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search title...">
                    </div>
                </div>

                <!-- Filters & Sorting -->
                <section class="filters-section">
                    <div class="filter-group">
                        <select id="filter-category">
                            <option value="">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Bills">Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Other">Other</option>
                        </select>
                        <input type="date" id="filter-date">
                        <select id="sort-by">
                            <option value="date-desc">Newest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="amount-desc">Amount: High to Low</option>
                            <option value="amount-asc">Amount: Low to High</option>
                        </select>
                    </div>
                </section>

                <!-- Tabs -->
                <nav class="tabs">
                    <button class="tab-btn active" data-tab="expenses">Expenses</button>
                    <button class="tab-btn" data-tab="reports">Reports</button>
                    <button class="tab-btn" data-tab="logs">Activity Log</button>
                </nav>

                <!-- Tab Content -->
                <div id="tab-content">
                    <!-- Expenses List -->
                    <div id="expenses-tab" class="tab-pane active">
                        <div id="expense-list" class="expense-list">
                            <!-- Cards will be injected here -->
                        </div>
                        <div class="pagination">
                            <button id="prev-page" class="btn btn-icon" disabled><i class="fas fa-chevron-left"></i></button>
                            <span id="page-info">Page 1</span>
                            <button id="next-page" class="btn btn-icon"><i class="fas fa-chevron-right"></i></button>
                            <select id="items-per-page" class="select-sm">
                                <option value="20">20 / page</option>
                                <option value="50">50 / page</option>
                                <option value="100">100 / page</option>
                            </select>
                        </div>
                    </div>

                    <!-- Reports View -->
                    <div id="reports-tab" class="tab-pane">
                        <div class="reports-container">
                            <div class="report-header">
                                <h2>Monthly Report</h2>
                                <button id="export-csv" class="btn btn-outline btn-sm">
                                    <i class="fas fa-file-csv"></i> Export visible to CSV
                                </button>
                            </div>
                            <div id="category-breakdown" class="breakdown-list">
                                <!-- Breakdown injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Activity Logs View -->
                    <div id="logs-tab" class="tab-pane">
                        <div class="logs-container">
                            <div id="activity-list" class="activity-list">
                                <!-- Logs injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </section>

        <!-- Expense Modal -->
        <div id="expense-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Add Expense</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="expense-form">
                    <input type="hidden" id="expense-id">
                    <div class="form-group">
                        <label for="title">Title*</label>
                        <input type="text" id="title" required placeholder="e.g. Grocery shopping">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount*</label>
                        <input type="number" id="amount" required step="0.01" min="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="category">Category*</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Bills">Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date*</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes (Optional)</label>
                        <textarea id="notes" rows="3" placeholder="Add some details..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline close-modal">Cancel</button>
                        <button type="submit" id="save-expense" class="btn btn-primary">Save Expense</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="delete-modal" class="modal">
            <div class="modal-content sm">
                <h2>Delete Expense?</h2>
                <p>Are you sure you want to delete this expense? This action cannot be undone.</p>
                <div class="form-actions">
                    <button class="btn btn-outline close-modal">Cancel</button>
                    <button id="confirm-delete" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
