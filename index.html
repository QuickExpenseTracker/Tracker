<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Premium Dashboard</title>
    <meta name="description" content="A premium, fast, and mobile-friendly expense tracker.">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
</head>
<body>
    <div id="app-container">
        <!-- Auth View -->
        <section id="auth-view" class="view hidden">
            <div class="auth-card">
                <div class="auth-icon">💰</div>
                <h1>Expense Tracker</h1>
                <p>Manage your daily expenses with ease.</p>
                <button id="login-btn" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Sign in with Google
                </button>
            </div>
        </section>

        <!-- Main View -->
        <section id="main-view" class="view hidden">
            <header class="main-header">
                <div class="header-content">
                    <div class="brand">
                        <span class="logo">💰</span>
                        <div class="brand-text">
                            <span class="title">Tracker</span>
                            <span id="user-name" class="subtitle">Welcome, User</span>
                        </div>
                    </div>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </header>

            <nav class="nav-tabs">
                <button class="tab-btn active" data-tab="expenses">Expenses</button>
                <button class="tab-btn" data-tab="reports">Reports</button>
                <button class="tab-btn" data-tab="logs">Activity</button>
            </nav>

            <main class="content">
                <!-- Filters Area -->
                <div id="expenses-tab" class="tab-pane active">
                    <!-- Summary Section -->
                    <section class="quick-summary">
                        <div class="sum-card">
                            <span class="label">This Month</span>
                            <div class="sum-value-row">
                                <span id="total-month" class="value">₹0</span>
                                <span id="month-diff" class="diff-badge">--</span>
                            </div>
                            <span class="diff-label">vs Last Month</span>
                        </div>
                        <div class="sum-card">
                            <span class="label">Spent Today</span>
                            <div class="sum-value-row">
                                <span id="total-today" class="value">₹0</span>
                                <span id="today-diff" class="diff-badge">--</span>
                            </div>
                            <span class="diff-label">vs Yesterday</span>
                        </div>
                    </section>
                    
                    <!-- Analytics Chart -->
                    <div class="chart-container-card">
                        <canvas id="expense-chart"></canvas>
                    </div>
                    <div class="controls-grid">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search expenses...">
                        </div>
                        <div class="filters-row">
                            <select id="filter-category">
                                <option value="">All Categories</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Health">Health</option>
                                <option value="Other">Other</option>
                            </select>
                            <input type="date" id="filter-date">
                            <select id="sort-by">
                                <option value="date-desc">Newest First</option>
                                <option value="date-asc">Oldest First</option>
                                <option value="amount-desc">Highest Price</option>
                                <option value="amount-asc">Lowest Price</option>
                            </select>
                        </div>
                    </div>

                    <div id="expense-list" class="expense-cards-container">
                        <!-- Items injected here -->
                    </div>

                    <div class="pagination-bar">
                        <button id="prev-page" class="p-btn"><i class="fas fa-chevron-left"></i></button>
                        <span id="page-info">Page 1</span>
                        <button id="next-page" class="p-btn"><i class="fas fa-chevron-right"></i></button>
                        <select id="items-per-page">
                            <option value="20">20 / page</option>
                            <option value="50">50 / page</option>
                        </select>
                    </div>
                </div>

                <!-- Reports Tab -->
                <div id="reports-tab" class="tab-pane">
                    <div class="report-view">
                        <div class="report-header">
                            <h2>Monthly Breakdown</h2>
                            <button id="export-csv" class="btn-action">Export CSV</button>
                        </div>
                        <div id="category-breakdown" class="breakdown-list"></div>
                    </div>
                </div>

                <!-- Logs Tab -->
                <div id="logs-tab" class="tab-pane">
                    <div id="activity-list" class="logs-list"></div>
                    <div class="pagination-bar">
                        <button id="prev-logs" class="p-btn"><i class="fas fa-chevron-left"></i></button>
                        <span id="log-page-info">Page 1</span>
                        <button id="next-logs" class="p-btn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </main>

            <!-- Floating Action Button -->
            <button id="add-expense-btn" class="fab">+</button>
        </section>

        <!-- Modals -->
        <div id="expense-modal" class="modal">
            <div class="modal-box">
                <div class="modal-head">
                    <h2 id="modal-title">New Expense</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="expense-form">
                    <input type="hidden" id="expense-id">
                    <div class="input-group">
                        <label>What did you buy?*</label>
                        <input type="text" id="title" required placeholder="Grocery, Coffee, etc.">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Amount (₹)*</label>
                            <input type="number" id="amount" required step="0.01" min="0.01">
                        </div>
                        <div class="input-group">
                            <label>Category*</label>
                            <select id="category" required>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Health">Health</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Date*</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="notes" rows="2" placeholder="Any details?"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel close-modal">Cancel</button>
                        <button type="submit" class="btn-save">Save Expense</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Modal -->
        <div id="delete-modal" class="modal">
            <div class="modal-box mini">
                <h2>Delete?</h2>
                <p>Are you sure you want to remove this record?</p>
                <div class="modal-footer">
                    <button class="btn-cancel close-modal">No, Keep it</button>
                    <button id="confirm-delete" class="btn-delete">Yes, Delete</button>
                </div>
            </div>
        </div>

        <div id="toast-container"></div>
        <div id="loading-overlay" class="hidden"><div class="loader"></div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
